<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Token Triage banner</title>
  <desc id="desc">A futuristic interface showing context being filtered into a compact token budget.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09111F"/>
      <stop offset="0.48" stop-color="#102A43"/>
      <stop offset="1" stop-color="#031B1F"/>
    </linearGradient>
    <linearGradient id="beam" x1="244" y1="320" x2="1024" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.15"/>
      <stop offset="0.45" stop-color="#A7F3D0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FDE68A" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.38 0 0 0 0 0.91 0 0 0 0 0.95 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#E2E8F0" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <path d="M150 470 C332 310 445 470 610 310 C765 160 894 326 1130 170" stroke="#67E8F9" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M114 150 C284 250 397 130 576 250 C760 374 894 205 1164 388" stroke="#FDE68A" stroke-opacity="0.18" stroke-width="2"/>

  <g transform="translate(92 138)">
    <rect width="300" height="364" rx="24" fill="url(#card)" stroke="#BAE6FD" stroke-opacity="0.22"/>
    <text x="30" y="58" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700">Raw Context</text>
    <g fill="#E2E8F0" opacity="0.78" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">
      <text x="30" y="108">repo/**</text>
      <text x="30" y="146">logs/large.txt</text>
      <text x="30" y="184">node_modules/</text>
      <text x="30" y="222">docs/archive/</text>
      <text x="30" y="260">exact error</text>
      <text x="30" y="298">tests nearby</text>
    </g>
    <g opacity="0.72">
      <rect x="30" y="322" width="210" height="12" rx="6" fill="#38BDF8"/>
      <rect x="30" y="346" width="146" height="12" rx="6" fill="#94A3B8"/>
    </g>
  </g>

  <g filter="url(#softGlow)">
    <path d="M424 260 L590 320 L424 380 Z" fill="url(#beam)"/>
    <path d="M856 260 L690 320 L856 380 Z" fill="url(#beam)"/>
    <circle cx="640" cy="320" r="86" fill="#0F766E" fill-opacity="0.56" stroke="#A7F3D0" stroke-opacity="0.8" stroke-width="3"/>
    <circle cx="640" cy="320" r="52" fill="#042F2E" stroke="#67E8F9" stroke-opacity="0.65" stroke-width="2"/>
    <path d="M610 318 L632 340 L675 294" stroke="#FDE68A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(888 138)">
    <rect width="300" height="364" rx="24" fill="url(#card)" stroke="#FDE68A" stroke-opacity="0.28"/>
    <text x="30" y="58" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700">Cheap Path</text>
    <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">
      <rect x="30" y="92" width="132" height="34" rx="17" fill="#134E4A"/>
      <text x="52" y="115" fill="#CCFBF1" font-weight="700">focused</text>
      <text x="30" y="164" fill="#E2E8F0">map first</text>
      <text x="30" y="204" fill="#E2E8F0">grep exact symbols</text>
      <text x="30" y="244" fill="#E2E8F0">read snippets</text>
      <text x="30" y="284" fill="#E2E8F0">capsule once</text>
      <text x="30" y="324" fill="#FDE68A" font-weight="700">4.3k tokens</text>
    </g>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="92" y="86" fill="#F8FAFC" font-size="64" font-weight="800">Token Triage</text>
    <text x="96" y="552" fill="#BAE6FD" font-size="28" font-weight="600">Spend context like money. Read less. Know enough.</text>
  </g>
</svg>
